name: Deploy PoFace to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_WEBAPP_NAME: 'poface-dev-web'
  AZURE_RESOURCE_GROUP: 'PoFace'
  AZURE_WEBAPP_URL: 'https://poface-dev-web.azurewebsites.net'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore PoFace.slnx

      - name: Build
        run: dotnet build PoFace.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/PoFace.UnitTests/PoFace.UnitTests.csproj --configuration Release --no-build --logger "console;verbosity=minimal"

      - name: Publish
        run: dotnet publish src/PoFace.Api/PoFace.Api.csproj --configuration Release --no-build --output ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zip publish output
        run: cd ./publish && zip -r ../deploy.zip . && cd ..

      - name: Upload package to Blob Storage
        id: upload
        run: |
          SA_KEY=$(az storage account keys list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --account-name pofacedevsa \
            --query '[0].value' -o tsv)

          az storage container create \
            --account-name pofacedevsa \
            --account-key "$SA_KEY" \
            --name deployments --output none 2>/dev/null || true

          BLOB_NAME="deploy-${{ github.sha }}.zip"
          az storage blob upload \
            --account-name pofacedevsa \
            --account-key "$SA_KEY" \
            --container-name deployments \
            --name "$BLOB_NAME" \
            --file ./deploy.zip \
            --overwrite --output none

          # SAS valid for 90 days — rotated on every deploy
          SAS_EXPIRY=$(date -u -d "90 days" '+%Y-%m-%dT%H:%MZ')
          SAS_TOKEN=$(az storage blob generate-sas \
            --account-name pofacedevsa \
            --account-key "$SA_KEY" \
            --container-name deployments \
            --name "$BLOB_NAME" \
            --permissions r --expiry "$SAS_EXPIRY" \
            --https-only -o tsv)

          echo "blob_url=https://pofacedevsa.blob.core.windows.net/deployments/${BLOB_NAME}?${SAS_TOKEN}" >> $GITHUB_OUTPUT

      - name: Deploy via Run-From-Package (no Kudu upload)
        run: |
          # Point WEBSITE_RUN_FROM_PACKAGE at the blob — App Service reads it directly.
          # This bypasses Kudu OneDeploy and avoids the 504 gateway timeout.
          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --settings "WEBSITE_RUN_FROM_PACKAGE=${{ steps.upload.outputs.blob_url }}" \
            --output none

          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --output none

          echo "Waiting for app to start..."
          sleep 45

      - name: Verify deployment health
        run: |
          echo "Checking health at ${{ env.AZURE_WEBAPP_URL }}/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.AZURE_WEBAPP_URL }}/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS"
          fi
