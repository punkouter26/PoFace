services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: poface-azurite
    ports:
      - "10000:10000"   # Blob
      - "10001:10001"   # Queue
      - "10002:10002"   # Table
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --loose
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10002"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

volumes:
  azurite-data:
